# Cloudflare Pages deployment config.
#
# Project name is whatever you created in the Cloudflare dashboard.
# `pages_build_output_dir` matches @cloudflare/next-on-pages output.
#
# Environment variables go in the Pages dashboard (or `wrangler pages secret put`)
# — keep this file free of secrets.

name = "tradehut-stores-fe"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
# Public, non-secret values. Override per-environment in the Pages dashboard.
# NEXT_PUBLIC_API_URL is read by lib/axiosInstance.tsx.
NEXT_PUBLIC_API_URL = "https://api.tradehut.com/tradehut/api/v1/"
NEXT_PUBLIC_IMAGE_HOST = "https://images.tradehut.com"

[env.preview.vars]
NEXT_PUBLIC_API_URL = "https://api-staging.tradehut.com/tradehut/api/v1/"
