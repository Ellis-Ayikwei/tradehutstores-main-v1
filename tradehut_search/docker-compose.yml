version: "3.8"

# Starts: Elasticsearch, Kibana, Redis
# Postgres with pgvector is expected to be running separately.
#
# Usage:
#   docker-compose up -d
#   docker-compose down
#   docker-compose logs -f elasticsearch

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: tradehut_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # disable auth for local dev
      - ES_JAVA_OPTS=-Xms1g -Xmx1g         # 1GB heap — increase for production
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: tradehut_kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    profiles:
      - kibana   # only started with: docker-compose --profile kibana up

  redis:
    image: redis:7-alpine
    container_name: tradehut_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Embedding service — only needed in production split architecture
  # For local dev, CLIP runs inside Celery workers
  embedding_service:
    build: ./embedding_service
    container_name: tradehut_embedding
    ports:
      - "8001:8001"
    environment:
      - HF_HOME=/app/models
    volumes:
      - hf_cache:/app/models     # persist downloaded models across restarts
    profiles:
      - embedding                # start with: docker-compose --profile embedding up

volumes:
  es_data:
  redis_data:
  hf_cache:
