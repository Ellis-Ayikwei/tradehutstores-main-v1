<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&amp;family=JetBrains+Mono:wght@400;700&amp;family=Epilogue:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#fff8f6",
                    "on-surface-variant": "#5a4137",
                    "inverse-surface": "#3d2d26",
                    "secondary-fixed-dim": "#3fdfa5",
                    "secondary": "#006c4b",
                    "surface-variant": "#f8ddd3",
                    "primary": "#a43d00",
                    "surface-dim": "#efd5cb",
                    "tertiary-fixed-dim": "#b0c6ff",
                    "surface-container-low": "#fff1ec",
                    "on-primary-container": "#4e1900",
                    "on-tertiary-container": "#002761",
                    "on-tertiary-fixed": "#001945",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#f8ddd3",
                    "on-secondary-fixed": "#002114",
                    "primary-fixed": "#ffdbcd",
                    "on-primary-fixed-variant": "#7d2d00",
                    "on-tertiary-fixed-variant": "#00429b",
                    "error": "#ba1a1a",
                    "tertiary": "#0058ca",
                    "on-background": "#261813",
                    "outline": "#8e7165",
                    "secondary-container": "#60f9bd",
                    "on-surface": "#261813",
                    "surface-tint": "#a43d00",
                    "outline-variant": "#e2bfb2",
                    "on-secondary-fixed-variant": "#005138",
                    "tertiary-fixed": "#d9e2ff",
                    "secondary-fixed": "#63fcc0",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#360f00",
                    "surface-container": "#ffe9e2",
                    "tertiary-container": "#558dff",
                    "primary-container": "#f5620f",
                    "error-container": "#ffdad6",
                    "inverse-on-surface": "#ffede7",
                    "surface-container-high": "#fee3d9",
                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#fff8f6",
                    "primary-fixed-dim": "#ffb597",
                    "inverse-primary": "#ffb597",
                    "on-error-container": "#93000a",
                    "background": "#fff8f6",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#00714f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Syne", "sans-serif"],
                    "body": ["DM Sans", "sans-serif"],
                    "label": ["Plus Jakarta Sans", "sans-serif"],
                    "mono": ["JetBrains Mono", "monospace"]
            },
            "boxShadow": {
                "card": "0 4px 20px 0 rgba(38, 24, 19, 0.04), 0 1px 2px 0 rgba(38, 24, 19, 0.02)",
                "card-hover": "0 12px 32px 0 rgba(38, 24, 19, 0.08)"
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0c0a09; /* Approximating gray-950 per request */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 antialiased font-body">
<!-- Transactional Shell Suppression: Navigation excluded as per Task-Focused/Transactional rules -->
<main class="w-full max-w-[400px]">
<!-- Kinetic Gallery Card: Architectural Layering -->
<div class="relative group">
<!-- Background Layer (Level 1) -->
<div class="absolute -inset-1 bg-gradient-to-tr from-primary to-primary-container rounded-xl blur opacity-20 group-hover:opacity-30 transition duration-1000"></div>
<!-- Content Layer (Level 2) -->
<div class="relative bg-surface-container-lowest rounded-xl p-8 shadow-card flex flex-col items-center text-center">
<!-- Stylized Mail Icon -->
<div class="mb-8 relative">
<div class="w-20 h-20 bg-surface-container-low rounded-2xl flex items-center justify-center rotate-3 transition-transform group-hover:rotate-6 duration-500">
<div class="w-16 h-16 bg-surface-container-highest rounded-xl flex items-center justify-center -rotate-3 transition-transform group-hover:-rotate-12 duration-500">
<span class="material-symbols-outlined text-4xl text-primary-container" style="font-variation-settings: 'FILL' 1;">
                                mail
                            </span>
</div>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute -top-2 -right-2 w-4 h-4 bg-secondary-fixed-dim rounded-full"></div>
<div class="absolute -bottom-1 -left-3 w-3 h-3 bg-tertiary-container rounded-full opacity-50"></div>
</div>
<!-- Header: Syne Editorial Voice -->
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-4">
                    Check your email
                </h1>
<!-- Subtext: DM Sans Workhorse -->
<p class="font-body text-on-surface-variant leading-relaxed mb-10 text-[15px]">
                    We've sent a password reset link to your email address. Please follow the instructions to reset your password.
                </p>
<!-- Actions -->
<div class="w-full space-y-6">
<!-- Resend Link CTA -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white rounded-md font-bold text-sm tracking-wide shadow-lg hover:shadow-primary/20 transition-all active:scale-[0.98]">
                        Resend link
                    </button>
<div class="pt-2 flex flex-col gap-4">
<a class="text-primary-container font-semibold text-sm hover:underline decoration-2 underline-offset-4 transition-all" href="#">
                            Didn't receive the email?
                        </a>
<div class="h-[1px] w-12 bg-outline-variant/30 mx-auto"></div>
<a class="flex items-center justify-center gap-2 text-on-surface-variant font-medium text-sm hover:text-on-surface transition-colors group/back" href="#">
<span class="material-symbols-outlined text-[18px] group-hover/back:-translate-x-1 transition-transform">arrow_back</span>
                            Back to Login
                        </a>
</div>
</div>
</div>
</div>
<!-- Footnote: Tonal Depth without Borders -->
<div class="mt-8 text-center">
<p class="font-mono text-[11px] text-white/30 tracking-widest uppercase">
                Secure Session • Ref: <span class="text-white/50">KH-9921-X</span>
</p>
</div>
</main>
<!-- Content-only shell, Footer suppressed for focused journey -->
</body></html>
