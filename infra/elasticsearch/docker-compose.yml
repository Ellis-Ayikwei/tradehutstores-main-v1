# Elasticsearch single-node deployment for a Hetzner CX22 (4 GB RAM).
#
# ELASTIC_PASSWORD: set in `.env` (see `.env.example`) or export in the shell.
# If unset, a local-dev default is used — override in production.
#
# Place this on the box at /opt/tradehut-search/docker-compose.yml and run:
#
#   docker compose up -d
#
# Open ports
#   • 9200 — REST API (firewall to Railway egress IPs only).
#   • 5601 — Kibana (optional; firewall to your IP only).
#
# RAM budget on a 4 GB box:
#   • ES_JAVA_OPTS heap = 1g  (ES rule: heap ≤ 50% of RAM, never above 31g)
#   • Reserve ~1.5 GB headroom for the OS + filesystem cache.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es
    restart: unless-stopped
    environment:
      - node.name=es-tradehut
      - cluster.name=tradehut-search
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-LocalDevElasticsearch_ChangeMeInProd}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      # NOTE: bind to 127.0.0.1 + reverse-proxy via Caddy/nginx with TLS,
      # OR firewall this port to Railway's egress block.
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    restart: unless-stopped
    depends_on: [elasticsearch]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-LocalDevElasticsearch_ChangeMeInProd}
    ports:
      - "5601:5601"

volumes:
  esdata:
